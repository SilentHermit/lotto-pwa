<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />

  <!-- iOS 홈화면(웹앱)용 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="로또번호 생성기">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <link rel="manifest" href="./manifest.webmanifest" />
  <title>로또번호 생성기</title>

  <style>
    :root{
      --bg:#0b1220; --card:#101a33; --text:#e8eefc; --muted:#a8b3d6;
      --accent:#6ea8fe; --line:rgba(255,255,255,.12);
    }
    body{margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif; background:var(--bg); color:var(--text);}
    header{padding:18px 16px 10px; position:sticky; top:0; background:linear-gradient(180deg, rgba(11,18,32,.95), rgba(11,18,32,.65)); backdrop-filter: blur(10px); border-bottom:1px solid var(--line);}
    h1{margin:0; font-size:18px;}
    .wrap{padding:14px 16px 40px; max-width:720px; margin:0 auto;}
    .card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; margin:12px 0;}
    .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
    .btn{appearance:none; border:1px solid var(--line); background:#0f1a36; color:var(--text);
      padding:12px 14px; border-radius:12px; font-weight:700; cursor:pointer;}
    .btn.primary{background:var(--accent); color:#081227; border-color:transparent;}
    .btn.ghost{background:transparent;}
    .btn.full{width:100%;}
    label{font-size:13px; color:var(--muted);}
    input, select{
      background:#0f1a36; border:1px solid var(--line); color:var(--text);
      padding:10px 12px; border-radius:12px; font-size:15px;
    }
    .pill{display:inline-flex; gap:8px; align-items:center; padding:8px 10px; border-radius:999px;
      border:1px solid var(--line); background:rgba(255,255,255,.04); color:var(--muted); font-size:12px;}
    .hidden{display:none !important;}
    .results{display:grid; gap:10px; margin-top:10px;}
    .resultItem{padding:12px; border-radius:12px; border:1px solid var(--line); background:rgba(255,255,255,.03);}
    .balls{display:flex; flex-wrap:wrap; gap:8px; margin-top:8px;}
    .ball{
      width:38px; height:38px; border-radius:999px; display:flex; align-items:center; justify-content:center;
      font-weight:800; background:#15224b; border:1px solid rgba(255,255,255,.10);
    }
    .meta{font-size:12px; color:var(--muted); margin-top:6px; line-height:1.45;}
    .topActions{display:flex; gap:10px; align-items:center; justify-content:space-between;}
    .small{font-size:12px; color:var(--muted);}
  </style>
</head>

<body>
  <header>
    <div class="topActions">
      <h1 id="appTitle">번호 생성기</h1>
      <button class="btn ghost" id="btnBack" onclick="showHome()" aria-label="뒤로" title="뒤로">처음</button>
    </div>
    <div class="small" id="subtitle">원하는 복권을 선택하세요</div>
  </header>

  <div class="wrap">

    <!-- 홈(선택 화면) -->
    <section id="viewHome" class="card">
      <div class="row" style="gap:12px;">
        <button class="btn primary full" onclick="selectMode('lotto')">로또번호 생성기 (6/45)</button>
        <button class="btn full" onclick="selectMode('pension')">연금복권720+ 생성기</button>
      </div>
      <p class="meta">
        참고: 로또/연금복권 모두 추첨은 독립 사건이라 “과거 당첨번호”가 다음 당첨 확률을 올리진 않습니다. 재미로 사용해 주세요.
      </p>
    </section>

    <!-- 로또 생성기 -->
    <section id="viewLotto" class="card hidden">
      <div class="row">
        <div>
          <label>생성 게임 수</label><br/>
          <input id="lottoCount" type="number" min="1" max="20" value="5" />
        </div>
        <button class="btn primary" onclick="generate('lotto')">로또 생성</button>
        <button class="btn" onclick="copyResults()">결과 복사</button>
      </div>
      <div class="pill">로또 6/45 · 1~45 중 6개(중복 없음)</div>
      <div id="resultsLotto" class="results"></div>
    </section>

    <!-- 연금복권 생성기 -->
    <section id="viewPension" class="card hidden">
      <div class="row">
        <div>
          <label>생성 매수</label><br/>
          <input id="pensionCount" type="number" min="1" max="20" value="5" />
        </div>

        <div>
          <label>조 선택</label><br/>
          <select id="pensionGroup">
            <option value="random" selected>랜덤(1~5조)</option>
            <option value="1">1조</option>
            <option value="2">2조</option>
            <option value="3">3조</option>
            <option value="4">4조</option>
            <option value="5">5조</option>
          </select>
        </div>

        <button class="btn primary" onclick="generate('pension')">연금복권 생성</button>
        <button class="btn" onclick="copyResults()">결과 복사</button>
      </div>

      <div class="pill">연금복권720+ · 1조 000000 ~ 5조 999999 범위</div>
      <p class="meta">
        공식 안내: “1조 000000 ~ 5조 999999” 중 선택한 번호와 추첨번호가 끝자리부터 연속 일치 개수에 따라 당첨이 결정됩니다. [Source](https://www.dhlottery.co.kr/pt720/intro)
      </p>
      <div id="resultsPension" class="results"></div>
    </section>

  </div>

<script>
  // ---------- 공통 UI ----------
  const state = {
    mode: null,        // 'lotto' | 'pension'
    lastText: ''       // 복사/공유용 텍스트
  };

  function showHome(){
    state.mode = null;
    document.getElementById('appTitle').textContent = '번호 생성기';
    document.getElementById('subtitle').textContent = '원하는 복권을 선택하세요';

    document.getElementById('viewHome').classList.remove('hidden');
    document.getElementById('viewLotto').classList.add('hidden');
    document.getElementById('viewPension').classList.add('hidden');
  }

  function selectMode(mode){
    state.mode = mode;

    document.getElementById('viewHome').classList.add('hidden');
    document.getElementById('viewLotto').classList.toggle('hidden', mode !== 'lotto');
    document.getElementById('viewPension').classList.toggle('hidden', mode !== 'pension');

    if(mode === 'lotto'){
      document.getElementById('appTitle').textContent = '로또번호 생성기';
      document.getElementById('subtitle').textContent = '6/45 자동번호 생성';
    } else {
      document.getElementById('appTitle').textContent = '연금복권720+ 생성기';
      document.getElementById('subtitle').textContent = '조 + 6자리 자동번호 생성';
    }
  }

  function generate(which){
    if(which === 'lotto') generateLotto();
    else generatePension();
  }

  async function copyResults(){
    if(!state.lastText){
      alert('복사할 결과가 아직 없어요. 먼저 생성해 주세요.');
      return;
    }
    try{
      await navigator.clipboard.writeText(state.lastText);
      alert('복사 완료! 원하는 곳에 붙여넣기 하세요.');
    }catch(e){
      // iOS에서 clipboard 권한이 까다로운 경우 대비
      prompt('아래 내용을 길게 눌러 복사하세요:', state.lastText);
    }
  }

  // ---------- 로또 생성 ----------
  function generateLottoOneSet(){
    // 기본 랜덤: 1~45 중 6개 중복 없이
    const s = new Set();
    while(s.size < 6){
      s.add(randInt(1,45));
    }
    return Array.from(s).sort((a,b)=>a-b);
  }

  function renderLottoSets(sets){
    const box = document.getElementById('resultsLotto');
    box.innerHTML = '';
    sets.forEach((nums, idx)=>{
      const item = document.createElement('div');
      item.className = 'resultItem';
      item.innerHTML = `
        <div><b>${idx+1}게임</b> · <span class="small">${nums.join(', ')}</span></div>
        <div class="balls">${nums.map(n=>`<div class="ball">${n}</div>`).join('')}</div>
      `;
      box.appendChild(item);
    });
  }

  function generateLotto(){
    const count = clampInt(document.getElementById('lottoCount').value, 1, 20, 5);
    const sets = [];
    for(let i=0; i<count; i++) sets.push(generateLottoOneSet());
    renderLottoSets(sets);

    // 복사용 텍스트
    state.lastText = sets.map((a,i)=>`${i+1}) ${a.join(', ')}`).join('\n');
  }

  // ---------- 연금복권 생성 ----------
  function generatePensionOne(){
    const groupSel = document.getElementById('pensionGroup').value;
    const group = (groupSel === 'random') ? randInt(1,5) : parseInt(groupSel,10);

    // 6자리(000000~999999) : 각 자리 0~9
    let digits = '';
    for(let i=0;i<6;i++) digits += String(randInt(0,9));

    return { group, digits };
  }

  function renderPension(list){
    const box = document.getElementById('resultsPension');
    box.innerHTML = '';
    list.forEach((t, idx)=>{
      const item = document.createElement('div');
      item.className = 'resultItem';
      item.innerHTML = `
        <div><b>${idx+1}매</b> · <span class="small">${t.group}조 ${t.digits}</span></div>
        <div class="balls">
          <div class="ball">${t.group}</div>
          ${t.digits.split('').map(d=>`<div class="ball">${d}</div>`).join('')}
        </div>
      `;
      box.appendChild(item);
    });
  }

  function generatePension(){
    const count = clampInt(document.getElementById('pensionCount').value, 1, 20, 5);
    const list = [];
    for(let i=0; i<count; i++) list.push(generatePensionOne());
    renderPension(list);

    state.lastText = list.map((t,i)=>`${i+1}) ${t.group}조 ${t.digits}`).join('\n');
  }

  // ---------- 유틸 ----------
  function randInt(min, max){
    return Math.floor(Math.random()*(max-min+1))+min;
  }
  function clampInt(v, min, max, fallback){
    const n = parseInt(v,10);
    if(Number.isNaN(n)) return fallback;
    return Math.max(min, Math.min(max, n));
  }

  // ---------- Service Worker 등록 ----------
  window.addEventListener('load', () => {
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('./sw.js').catch(()=>{});
    }
    showHome(); // 첫 화면은 선택 화면
  });
</script>
</body>
</html>
